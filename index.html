<!DOCTYPE html>
<html>
<head>
    <title>Visor de Red - Pedro</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    
    <style>
        body { margin:0; padding:0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #map { width: 100vw; height: 100vh; z-index: 1; }

        /* MENU LATERAL */
        #sidebar { 
            position: absolute; top: 0; left: -300px; 
            width: 300px; height: 100vh; 
            background: rgba(44, 62, 80, 0.95); color: white; 
            transition: all 0.4s ease; z-index: 2000; 
            box-shadow: 2px 0 10px rgba(0,0,0,0.3); padding: 20px;
            box-sizing: border-box; backdrop-filter: blur(5px);
            display: flex; flex-direction: column;
        }
        #sidebar.active { left: 0; }

        #toggle-btn {
            position: absolute; bottom: 20px; left: 10px;
            z-index: 2100; background: #2c3e50; color: white;
            border: 2px solid rgba(255,255,255,0.2); padding: 10px 15px;
            border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold;
        }
        #sidebar.active + #toggle-btn { left: 310px; }

        #locate-btn {
            position: absolute; bottom: 80px; left: 12px;
            z-index: 1000; background: white; width: 40px; height: 40px;
            border: 2px solid rgba(0,0,0,0.3); border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: #c0392b; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .search-box-coords { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .search-box-coords input { width: 100%; padding: 8px; border-radius: 4px; border: none; margin-bottom: 8px; font-size: 12px; box-sizing: border-box; }
        .btn-search-coords { width: 100%; background: #e67e22; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 11px; }

        .olt-item { background: rgba(255,255,255,0.1); margin-bottom: 8px; padding: 10px; border-radius: 6px; cursor: pointer; border-left: 4px solid #1abc9c; font-size: 13px; }
        .olt-item:hover { background: rgba(255,255,255,0.2); }

        #lista-olts { flex-grow: 1; overflow-y: auto; margin-top: 10px; }
        .btn-oficina { background: #3498db; color: white; border: none; padding: 8px; border-radius: 20px; width: 100%; cursor: pointer; font-size: 12px; margin-bottom: 15px; }
        .coords-badge { background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 4px; padding: 4px; font-family: monospace; font-size: 10px; color: #2c3e50; display: block; margin-top: 5px; text-align: center; }
        .custom-icon { display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="margin-top: 10px; display: flex; justify-content: space-between; align-items: center;">
        📡 OLTs <span id="contador-olt" style="background: #1abc9c; padding: 2px 8px; border-radius: 10px; font-size: 14px;">0</span>
    </h2>
    
    <div style="position: relative; margin-bottom: 15px;">
        <input type="text" id="buscador-olt" placeholder="Buscar OLT por nombre..." 
            style="width: 100%; padding: 10px 35px 10px 10px; border-radius: 20px; border: none; background: rgba(255,255,255,0.1); color: white; outline: none; box-sizing: border-box;">
        <i class="fas fa-search" style="position: absolute; right: 12px; top: 12px; color: #bdc3c7;"></i>
    </div>

    <div class="search-box-coords">
        <label style="font-size: 11px; color: #1abc9c; font-weight: bold; display: block; margin-bottom: 5px;">📍 IR A COORDENADA</label>
        <input type="text" id="input-coords" placeholder="Ej: 21.172, -86.914">
        <button class="btn-search-coords" onclick="buscarCoordenadas()">🔍 Ubicar en Mapa</button>
    </div>

    <button class="btn-oficina" onclick="irAOficina()">🏢 Ir a Oficina Central</button>
    <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 10px 0;">
    
    <div id="lista-olts">
        <p id="msg-vacio" style="font-size: 12px; color: #bdc3c7;">Cargando equipos...</p>
    </div>
</div>

<button id="toggle-btn" onclick="toggleSidebar()">☰ Abrir Menú</button>

<div id="locate-btn" onclick="miUbicacion()" title="¿Dónde estoy?">
    <i class="fas fa-crosshairs"></i>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AiZaSyBnu_jCWpmiIGL6vWDD4bJ-Dde3AJZL_88",
        authDomain: "olt-mapa.firebaseapp.com",
        projectId: "olt-mapa",
        storageBucket: "olt-mapa.firebasestorage.app",
        messagingSenderId: "101074004534",
        appId: "1:101074004534:web:3aa75c1b313042accb4697"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const fibraColl = collection(db, "red_fibra");

    const iconos = {
        "Olt": L.divIcon({ html: '<i class="fas fa-server" style="color: #1abc9c; font-size: 20px;"></i>', className: 'custom-icon', iconSize: [24, 24] }),
        "naps de distribución": L.divIcon({ html: '<i class="fas fa-wifi" style="color: #f1c40f; font-size: 18px;"></i>', className: 'custom-icon', iconSize: [20, 20] }),
        "Cierre troncal": L.divIcon({ html: '<i class="fas fa-box-open" style="color: #e67e22; font-size: 18px;"></i>', className: 'custom-icon', iconSize: [20, 20] }),
        "registro Subterráneo": L.divIcon({ html: '<i class="fas fa-square" style="color: #34495e; font-size: 18px;"></i>', className: 'custom-icon', iconSize: [20, 20] }),
        "Postes CFE": L.divIcon({ html: '<i class="fas fa-broadcast-tower" style="color: #7f8c8d; font-size: 18px;"></i>', className: 'custom-icon', iconSize: [20, 20] }),
        "Oficina": L.divIcon({ html: '<i class="fas fa-building" style="color: #2980b9; font-size: 26px;"></i>', className: 'custom-icon', iconSize: [30, 30] }),
        "Clientes": L.divIcon({ html: '<i class="fas fa-user-tag" style="color: #e74c3c; font-size: 18px;"></i>', className: 'custom-icon', iconSize: [20, 20] })
    };

    var mapaSatelital = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Esri' });
    var mapaCalles = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: 'OSM' });

    var map = L.map('map', { center: [21.172238, -86.914997], zoom: 15, layers: [mapaSatelital] });
    var tempMarker = null;

    const coordOficina = [21.17233502772784, -86.91496940472089];
    L.marker(coordOficina, {icon: iconos["Oficina"]}).addTo(map).bindPopup("Oficina Central");

    var clusterClientes = L.markerClusterGroup({ disableClusteringAtZoom: 18 });

    var capasFisicas = {
        "Olt": L.layerGroup().addTo(map),
        "registro Subterráneo": L.layerGroup().addTo(map),
        "Fibra troncal": L.layerGroup().addTo(map),
        "Cierre troncal": L.layerGroup().addTo(map),
        "fibra de distribución": L.layerGroup().addTo(map),
        "naps de distribución": L.layerGroup().addTo(map),
        "Postes CFE": L.layerGroup().addTo(map),
        "Clientes": clusterClientes.addTo(map)
    };

    L.control.layers({"🛰️ Satelital": mapaSatelital, "🗺️ Mapa": mapaCalles}, capasFisicas).addTo(map);

    onSnapshot(fibraColl, (snapshot) => {
        for (let k in capasFisicas) capasFisicas[k].clearLayers();
        snapshot.forEach((docSnap) => {
            const data = docSnap.data();
            let geoData = (typeof data.geo === 'string') ? JSON.parse(data.geo) : data.geo;
            
            let layer = L.geoJSON(geoData, {
                pointToLayer: (f, latlng) => L.marker(latlng, {icon: iconos[data.info.capa] || new L.Icon.Default()})
            }).getLayers()[0];

            if(!layer) return;
            layer.customData = data.info;

            if (layer.setStyle) {
                let col = data.info.capa.includes('troncal') ? '#000080' : '#E4007C';
                layer.setStyle({color: col, weight: 4});
            }

            if(capasFisicas[data.info.capa]) capasFisicas[data.info.capa].addLayer(layer);

            let mLabel = data.info.metros ? `<br><b style="color: #d35400;">📏 ${data.info.metros} m</b>` : "";
            let tLabel = data.info.tipo ? `<br><b>🏗️ Inst:</b> ${data.info.tipo}` : "";
            let modLabel = data.info.modelo_elemento && data.info.modelo_elemento !== "N/A" ? `<br><b>🧩 Elem:</b> ${data.info.modelo_elemento}` : "";
            let hilLabel = data.info.hilos_fibra && data.info.hilos_fibra !== "N/A" ? `<br><b>🧵 Hilos:</b> ${data.info.hilos_fibra}` : "";
            let cantLabel = data.info.cantidad ? `<br><b style="color: #27ae60;">👥 Clientes: ${data.info.cantidad}</b>` : "";

            layer.bindPopup(`<b>${data.info.nombre}</b>${mLabel}${tLabel}${modLabel}${hilLabel}${cantLabel}<br><small>${data.info.capa}</small>`);
        });
        actualizarListaSidebar();
    });

    function actualizarListaSidebar() {
        var lista = document.getElementById('lista-olts');
        var cont = document.getElementById('contador-olt');
        if (!lista) return;
        lista.innerHTML = "";
        let total = 0;
        capasFisicas["Olt"].eachLayer(l => {
            total++;
            var d = document.createElement('div'); d.className = 'olt-item';
            d.innerHTML = `📡 ${l.customData.nombre}`;
            d.onclick = () => { 
                let pos = l.getLatLng ? l.getLatLng() : (l.getBounds ? l.getBounds().getCenter() : null);
                if (pos) { map.flyTo(pos, 18); setTimeout(() => l.openPopup(), 500); }
            };
            lista.appendChild(d);
        });
        if (cont) cont.innerText = total;
    }

    window.buscarCoordenadas = function() {
        const val = document.getElementById('input-coords').value;
        const partes = val.split(/[ ,]+/);
        if (partes.length >= 2) {
            const lat = parseFloat(partes[0]); const lng = parseFloat(partes[1]);
            if (!isNaN(lat) && !isNaN(lng)) {
                if (tempMarker) map.removeLayer(tempMarker);
                tempMarker = L.marker([lat, lng], {icon: L.divIcon({ html: '<i class="fas fa-map-pin" style="color: #e74c3c; font-size: 30px;"></i>', className: 'custom-icon', iconSize: [30, 30] })}).addTo(map);
                map.flyTo([lat, lng], 18);
            }
        }
    };
    window.irAOficina = function() { map.flyTo(coordOficina, 18); };
    window.miUbicacion = function() { map.locate({setView: true, maxZoom: 18}); };
    window.toggleSidebar = function() {
        var sb = document.getElementById('sidebar');
        sb.classList.toggle('active');
        document.getElementById('toggle-btn').innerHTML = sb.classList.contains('active') ? '✖ Cerrar' : '☰ Abrir Menú';
    };

    document.getElementById('buscador-olt').addEventListener('input', function(e) {
        const bus = e.target.value.toLowerCase();
        document.querySelectorAll('.olt-item').forEach(it => {
            it.style.display = it.innerText.toLowerCase().includes(bus) ? "block" : "none";
        });
    });
</script>
</body>
</html>
